# 主配置（本地 Docker / 服务器 Docker 共用；勿提交 git）
# Docker compose 默认挂载本文件到 /data/pte_live_im/conf/app.yaml

cluster:
  enabled: false

common:
  httpPort: "11511"
  webSocketPort: "11510"
  rpcPort: "11512"
  cluster: false
  cryptoKey: 0LyLnX07zc2Z8vzYyoVTfBukMBjF8ByX

etcd:
  endpoints: []

redis:
  addr: "pte_live_redis:6379"
  addrs:
    - "pte_live_redis:6379"
  mode: single
  password: ""
  db: 0

live:
  skipTokenValidate: false
  tokenKeyPrefix: "live:token:"
  queueWorkers: 2
  jwtSalt: "fKoJJ4jgnBXc6vZj4w592HvTDJGd89w2"
  jwtType: "user"
  jwtLeeway: 60
  jwtBlacklistPrefix: "auth:user:blacklist:"

auth:
  userSigVerifyUrl: ""
  userSigVerifyTimeout: 3
  legacyTokenEnabled: false

queue:
  backend: pulsar
  consumeFrom: pulsar

pulsar:
  enabled: true
  serviceURL: pulsar://pte_live_pulsar:6650
  topic: persistent://pte_live/live/im-events
  subscription: pte-live-im
  chatTopic: persistent://pte_live/live/chat-events
  chatSubscription: pte-live-im-chat
  chatWorkers: 2

cors:
  enabled: true
  allowOrigins:
    - "*"
  allowCredentials: true
